name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  linux:
    name: Linux / GCC
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev libsdl2-ttf-dev libsdl2-image-dev libsdl2-mixer-dev \
            cmake build-essential nlohmann-json3-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Package binary
        run: |
          mkdir -p dist/wizardry-cht-linux
          cp build/src/wizardry_cht dist/wizardry-cht-linux/
          cp -r assets dist/wizardry-cht-linux/
          cp -r src/i18n dist/wizardry-cht-linux/i18n
          cp README.md LICENSE RELEASE_NOTES_v1.0.md 2>/dev/null dist/wizardry-cht-linux/ || \
            cp README.md LICENSE dist/wizardry-cht-linux/
          # Include fetch scripts so users can pull optional assets (font, music)
          mkdir -p dist/wizardry-cht-linux/tools
          cp tools/fetch_assets.sh tools/fetch_music.sh tools/fetch_pcecd_sprites.sh \
             dist/wizardry-cht-linux/tools/
          chmod +x dist/wizardry-cht-linux/tools/*.sh
          tar -czf wizardry-cht-linux.tar.gz -C dist wizardry-cht-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wizardry-cht-linux
          path: wizardry-cht-linux.tar.gz

  windows-msvc:
    name: Windows / MSVC
    runs-on: windows-2022
    # vcpkg setup is brittle for first-time runs; mark as advisory.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          # 2026.06.01 release — newer than the previous pin which had a
          # broken pkgconf MSYS2 download URL.
          vcpkgGitCommitId: 'f3e10653cc27d62a37a3763cd84b38bca07c6075'

      # The default `x-gha,readwrite` binary source needs ACTIONS_RUNTIME_TOKEN
      # which isn't exposed to shell steps. Disable binary caching so vcpkg
      # builds from source (slower but reliable).
      - name: Install dependencies (vcpkg)
        env:
          VCPKG_BINARY_SOURCES: 'clear'
        run: |
          vcpkg install sdl2 sdl2-ttf sdl2-image sdl2-mixer nlohmann-json --triplet x64-windows
        shell: cmd

      - name: Configure
        run: |
          cmake -B build ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_TOOLCHAIN_FILE=%VCPKG_ROOT%/scripts/buildsystems/vcpkg.cmake ^
            -DVCPKG_TARGET_TRIPLET=x64-windows
        shell: cmd

      - name: Build
        run: cmake --build build --config Release -j

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

      - name: Package binary
        shell: cmd
        run: |
          mkdir dist\wizardry-cht-windows
          copy build\src\Release\wizardry_cht.exe dist\wizardry-cht-windows\
          xcopy assets dist\wizardry-cht-windows\assets /E /I /Q
          xcopy src\i18n dist\wizardry-cht-windows\i18n /E /I /Q
          copy README.md dist\wizardry-cht-windows\
          copy LICENSE dist\wizardry-cht-windows\
          copy build\vcpkg_installed\x64-windows\bin\*.dll dist\wizardry-cht-windows\
          powershell -Command "Compress-Archive -Path dist\wizardry-cht-windows -DestinationPath wizardry-cht-windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wizardry-cht-windows
          path: wizardry-cht-windows.zip

  release:
    name: Release
    # Wait for both build jobs so Windows artifact lands in the release.
    # windows-msvc has continue-on-error so Release still runs if Windows fails.
    needs: [linux, windows-msvc]
    # Always run, even if windows-msvc was skipped/failed (continue-on-error)
    if: always() && startsWith(github.ref, 'refs/tags/v') && needs.linux.result == 'success'
    runs-on: ubuntu-22.04
    permissions:
      contents: write  # required for softprops/action-gh-release to create releases
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -ls

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          # Linux required; Windows zip included if its job succeeded.
          files: |
            artifacts/wizardry-cht-linux/wizardry-cht-linux.tar.gz
            artifacts/wizardry-cht-windows/wizardry-cht-windows.zip
          fail_on_unmatched_files: false
          generate_release_notes: true
