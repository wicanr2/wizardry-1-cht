name: build-macos
# macOS build — arm64 only (Apple Silicon).
#
# Why not universal: GitHub Actions free-tier macos-13 (Intel) runners are
# effectively extinct — v1.24 / v1.25 dispatches sat in the queue for 24
# hours and timed out. The arm64 leg on macos-14 builds in ~1 minute.
#
# Intel Mac users on Big Sur+ can run the arm64 .app via Rosetta 2.
# A future revision can re-add x86_64 if GitHub restores Intel runners
# OR if we move to a paid plan with the macos-13 runner available.

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    name: macOS arm64 build
    runs-on: macos-14
    permissions:
      contents: write   # for release upload on tag push
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2 + bundling tools
        run: |
          brew update
          brew install sdl2 sdl2_ttf sdl2_image sdl2_mixer nlohmann-json dylibbundler

      - name: Configure
        # WIZ_ASSETS_DIR / WIZ_I18N_FILE are baked at compile time as string
        # literals; override them so the binary looks for assets relative
        # to CWD. A launcher script inside Contents/MacOS/ cds into its own
        # dir before exec'ing the real binary so the relative paths resolve.
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="11.0" \
            -DBUILD_TESTS=OFF \
            -DCMAKE_CXX_FLAGS="-DWIZ_ASSETS_DIR=\\\"assets\\\" -DWIZ_I18N_FILE=\\\"i18n/strings_zh_tw.json\\\""

      - name: Build
        run: cmake --build build -j --target wizardry_cht

      - name: Assemble .app skeleton
        run: |
          APP="Wizardry 1 CHT.app"
          mkdir -p "$APP/Contents/MacOS" \
                   "$APP/Contents/Resources" \
                   "$APP/Contents/Frameworks"
          cp build/src/wizardry_cht "$APP/Contents/MacOS/wizardry_cht_bin"
          cp -R assets        "$APP/Contents/MacOS/assets"
          mkdir -p "$APP/Contents/MacOS/i18n"
          cp src/i18n/strings_zh_tw.json "$APP/Contents/MacOS/i18n/"

      - name: Bundle dylibs (dylibbundler)
        run: |
          APP="Wizardry 1 CHT.app"
          dylibbundler -of -b \
            -x "$APP/Contents/MacOS/wizardry_cht_bin" \
            -d "$APP/Contents/Frameworks/" \
            -p "@executable_path/../Frameworks/"

      - name: Generate AppIcon.icns
        run: |
          APP="Wizardry 1 CHT.app"
          SRC="assets/themes/pcecd/title/background.png"
          if [ ! -f "$SRC" ]; then
            echo "title bg missing — skipping icon"; exit 0
          fi
          mkdir -p AppIcon.iconset
          sips -c 512 512 "$SRC" --out _icon_src.png >/dev/null
          for SIZE in 16 32 64 128 256 512; do
            sips -z $SIZE $SIZE _icon_src.png \
              --out "AppIcon.iconset/icon_${SIZE}x${SIZE}.png" >/dev/null
            DBL=$((SIZE*2))
            sips -z $DBL $DBL _icon_src.png \
              --out "AppIcon.iconset/icon_${SIZE}x${SIZE}@2x.png" >/dev/null || true
          done
          iconutil -c icns AppIcon.iconset \
            -o "$APP/Contents/Resources/AppIcon.icns" || \
            cp _icon_src.png "$APP/Contents/Resources/AppIcon.png"

      - name: Write Info.plist + launcher
        run: |
          APP="Wizardry 1 CHT.app"
          cat > "$APP/Contents/MacOS/wizardry_cht" <<'LAUNCH'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          cd "$DIR"
          exec ./wizardry_cht_bin "$@"
          LAUNCH
          chmod +x "$APP/Contents/MacOS/wizardry_cht"

          cat > "$APP/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>            <string>Wizardry 1 CHT</string>
            <key>CFBundleDisplayName</key>     <string>Wizardry 1 CHT</string>
            <key>CFBundleIdentifier</key>      <string>com.wicanr2.wizardry-1-cht</string>
            <key>CFBundleVersion</key>         <string>1.25</string>
            <key>CFBundleShortVersionString</key> <string>1.25</string>
            <key>CFBundleExecutable</key>      <string>wizardry_cht</string>
            <key>CFBundleIconFile</key>        <string>AppIcon</string>
            <key>CFBundlePackageType</key>     <string>APPL</string>
            <key>LSMinimumSystemVersion</key>  <string>11.0</string>
            <key>NSHighResolutionCapable</key> <true/>
          </dict>
          </plist>
          PLIST

      - name: Re-sign (ad-hoc)
        # dylibbundler rewrites install_name → existing signature breaks.
        # Ad-hoc sign so Gatekeeper sees a coherent bundle. End-user still
        # needs `xattr -dr com.apple.quarantine` on first launch (no Apple
        # Developer ID for a real signature).
        run: |
          APP="Wizardry 1 CHT.app"
          for L in "$APP/Contents/Frameworks/"*.dylib; do
            codesign --force --sign - "$L" || true
          done
          codesign --force --sign - "$APP/Contents/MacOS/wizardry_cht_bin" || true
          codesign --force --sign - "$APP/Contents/MacOS/wizardry_cht" || true
          codesign --force --sign - "$APP" || true

      - name: Make DMG
        run: |
          hdiutil create -volname "Wizardry 1 CHT" \
            -srcfolder "Wizardry 1 CHT.app" -ov -format UDZO \
            wizardry-cht-macos-arm64.dmg

      - name: Make tarball (Windows-readable fallback)
        run: |
          tar -czf wizardry-cht-macos-arm64.tar.gz "Wizardry 1 CHT.app"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wizardry-cht-macos-arm64
          path: |
            wizardry-cht-macos-arm64.dmg
            wizardry-cht-macos-arm64.tar.gz

      - name: Attach to release (on tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wizardry-cht-macos-arm64.dmg
            wizardry-cht-macos-arm64.tar.gz
